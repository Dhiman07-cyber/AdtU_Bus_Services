name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Non-blocking: repo carries pre-existing lint debt (~1800 findings).
      # Reported for visibility; typecheck/test/build are the hard gates.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          # Build must not require real secrets; provide harmless placeholders so
          # Next can compile. Real values come from Vercel at deploy/runtime.
          NODE_ENV: production
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci
          NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci
